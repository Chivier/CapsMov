name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-package:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Swift formatting
        run: xcrun swift-format lint --strict --recursive Sources tests
      - name: Test
        run: swift test
      - name: Verify packaging
        run: tests/test-packaging.sh
